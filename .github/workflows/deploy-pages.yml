name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build with live mode env vars
        run: npm run build
        env:
          VITE_APP_MODE: live
          VITE_AI_BACKEND_URL: https://stratageo-site-suitability-portal.vercel.app

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
